<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plan Andrés — Dinámico</title>
<style>
  :root {
    --black: #1a1a1a;
    --white: #f7f4ef;
    --accent: #c0392b;
    --gold: #8a6a1a;
    --border: #ddd;
  }
  body { background: var(--white); color: var(--black); font-family: sans-serif; margin: 0; line-height: 1.6; }
  .container { max-width: 800px; margin: 0 auto; padding: 20px; }
  .hero { background: var(--black); color: var(--white); padding: 40px; text-align: center; border-bottom: 5px solid var(--accent); }
  .calc-section { background: #fff; padding: 25px; border: 1px solid var(--border); margin: 20px 0; border-radius: 8px; }
  .input-group { display: flex; gap: 15px; justify-content: center; align-items: center; flex-wrap: wrap; }
  input { padding: 10px; border: 1px solid var(--border); border-radius: 4px; width: 80px; }
  .result-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-top: 20px; text-align: center; }
  .res-box { padding: 15px; background: #f9f9f9; border-radius: 4px; }
  .res-val { font-size: 20px; font-weight: bold; color: var(--accent); display: block; }
  .routine-day { background: white; margin-bottom: 15px; border: 1px solid var(--border); border-radius: 4px; }
  .day-header { background: #eee; padding: 10px 15px; font-weight: bold; }
  .exercise-list { padding: 15px; list-style: none; margin: 0; }
  .ex-item { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px dotted #ccc; }
  .completed { text-decoration: line-through; color: #888; }
</style>
</head>
<body>
<div class="hero">
  <h1 style="margin:0;">ANDRÉS <span style="color:var(--accent)">DEFINICIÓN</span></h1>
  <p>Calculadora de Macros & Checklist</p>
</div>
<div class="container">
  <div class="calc-section">
    <h3 style="margin-top:0">Ajuste de Macros</h3>
    <div class="input-group">
      <label>Peso (kg):</label>
      <input type="number" id="weight" value="102" oninput="updateMacros()">
    </div>
    <div class="result-grid">
      <div class="res-box"><span>Calorías</span><span class="res-val" id="cal-res">2100</span></div>
      <div class="res-box"><span>Proteína (g)</span><span class="res-val" id="prot-res">163</span></div>
      <div class="res-box"><span>Carbos (g)</span><span class="res-val" id="carb-res">210</span></div>
    </div>
  </div>
  <h3>Checklist Diario</h3>
  <div class="routine-day">
    <ul class="exercise-list">
      <li class="ex-item"><input type="checkbox" onclick="toggleStrike(this)"> <span>Entrenamiento de Fuerza</span></li>
      <li class="ex-item"><input type="checkbox" onclick="toggleStrike(this)"> <span>20 min Cardio</span></li>
      <li class="ex-item"><input type="checkbox" onclick="toggleStrike(this)"> <span>3L Agua</span></li>
      <li class="ex-item"><input type="checkbox" onclick="toggleStrike(this)"> <span>7-8h Sueño</span></li>
    </ul>
  </div>
</div>
<script>
  function updateMacros() {
    const w = document.getElementById('weight').value;
    if(w > 40) {
      document.getElementById('prot-res').innerText = Math.round(w * 1.6);
      document.getElementById('cal-res').innerText = Math.round(w * 20.5);
      document.getElementById('carb-res').innerText = Math.round((w * 20.5 * 0.4) / 4);
    }
  }
  function toggleStrike(checkbox) {
    checkbox.nextElementSibling.classList.toggle('completed', checkbox.checked);
  }
</script>
</body>
</html>
